; PlatformIO Project Configuration
; CNC Servo Sprayer - Hosyond ESP32-S3 2.8" ILI9341 + FT6336G Cap Touch

[env:esp32s3]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
board_build.partitions = default.csv

build_flags =
    ; ---- TFT_eSPI configuration (Hosyond ESP32-S3 2.8" board) ----
    -D USER_SETUP_LOADED=1
    -D ILI9341_DRIVER=1
    -D TFT_WIDTH=240
    -D TFT_HEIGHT=320
    -D TFT_MOSI=11
    -D TFT_MISO=13
    -D TFT_SCLK=12
    -D TFT_CS=10
    -D TFT_DC=46
    -D TFT_RST=-1
    -D SPI_FREQUENCY=40000000
    -D SPI_READ_FREQUENCY=6000000
    -D LOAD_GLCD=1
    -D LOAD_FONT2=1
    -D LOAD_FONT4=1
    -D SMOOTH_FONT=1

    ; ---- LVGL 8.x configuration (skip lv_conf.h) ----
    -D LV_CONF_SKIP=1
    -D LV_COLOR_DEPTH=16
    -D LV_COLOR_16_SWAP=0
    -D LV_MEM_SIZE="(48*1024)"
    -D LV_TICK_CUSTOM=1
    -D LV_TICK_CUSTOM_INCLUDE="\"Arduino.h\""
    -D LV_TICK_CUSTOM_SYS_TIME_EXPR="millis()"
    -D LV_USE_LOG=0

    ; Fonts
    -D LV_FONT_MONTSERRAT_12=1
    -D LV_FONT_MONTSERRAT_14=1
    -D LV_FONT_MONTSERRAT_16=1
    -D LV_FONT_MONTSERRAT_20=1
    -D LV_FONT_MONTSERRAT_24=1
    -D LV_FONT_MONTSERRAT_28=1
    -D LV_FONT_MONTSERRAT_36=1
    -D LV_FONT_DEFAULT="&lv_font_montserrat_14"

    ; Widgets (enable only what we use)
    -D LV_USE_ARC=1
    -D LV_USE_BAR=1
    -D LV_USE_BTN=1
    -D LV_USE_BTNMATRIX=1
    -D LV_USE_LABEL=1
    -D LV_USE_LINE=1
    -D LV_USE_SLIDER=1
    -D LV_USE_SWITCH=1
    -D LV_USE_TABVIEW=1
    -D LV_USE_LED=1
    -D LV_USE_OBJ=1
    -D LV_USE_IMG=1

    ; Disabled widgets (save flash)
    -D LV_USE_TEXTAREA=0
    -D LV_USE_TABLE=0
    -D LV_USE_ANIMIMG=0
    -D LV_USE_CALENDAR=0
    -D LV_USE_CHART=0
    -D LV_USE_COLORWHEEL=0
    -D LV_USE_IMGBTN=0
    -D LV_USE_KEYBOARD=0
    -D LV_USE_LIST=0
    -D LV_USE_METER=0
    -D LV_USE_MSGBOX=0
    -D LV_USE_ROLLER=0
    -D LV_USE_SPAN=0
    -D LV_USE_SPINBOX=0
    -D LV_USE_SPINNER=0
    -D LV_USE_TILEVIEW=0
    -D LV_USE_WIN=0
    -D LV_USE_DROPDOWN=0
    -D LV_USE_CHECKBOX=0

    ; Animation & drawing
    -D LV_USE_ANIMATION=1
    -D LV_USE_SHADOW=1
    -D LV_SHADOW_CACHE_SIZE=0
    -D LV_USE_BLEND_MODES=1

    ; ESP32-S3 Serial goes to UART0 (not USB-CDC) so we see output on COM port
    -D ARDUINO_USB_CDC_ON_BOOT=0

    ; Build optimization
    -D CORE_DEBUG_LEVEL=0
    -Os

lib_deps =
    bodmer/TFT_eSPI@^2.5.43
    lvgl/lvgl@^8.3.11
    madhephaestus/ESP32Servo@^3.0.5
